apply plugin: "com.android.application"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react"

react {
    autolinkLibrariesWithApp()
}

android {
    namespace "com.pluralspace.app"
    compileSdkVersion 35

    buildFeatures {
        prefab true
    }

    defaultConfig {
        applicationId "com.pluralspace.app"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 29
        versionName "1.4.2"
        missingDimensionStrategy 'store', 'play'
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file('../../plural-space.keystore')
            storePassword project.findProperty('PLURALSPACE_STORE_PASSWORD') ?: ''
            keyAlias 'pluralspace'
            keyPassword project.findProperty('PLURALSPACE_KEY_PASSWORD') ?: ''
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

dependencies {
    implementation("androidx.appcompat:appcompat:1.6.1")
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    implementation("com.facebook.fresco:animated-gif:3.6.0")
}
